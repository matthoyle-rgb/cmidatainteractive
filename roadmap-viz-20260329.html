<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUMAN Verification — You Are Here</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2433;
    --accent: #00e5a0;
    --accent2: #0091ff;
    --milestone: #ff6b35;
    --text: #e8eaf0;
    --text-dim: #5a6278;
    --text-mid: #8892a4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    padding: 18px 36px 14px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: auto auto 1fr auto auto;
    grid-template-rows: auto auto;
    align-items: center;
    column-gap: 16px;
    row-gap: 6px;
  }
  .logo {
    height: 16px;
    width: auto;
    display: block;
    flex-shrink: 0;
    grid-column: 1;
    grid-row: 1;
  }
  header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    grid-column: 2;
    grid-row: 1;
  }
  .header-hint {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    grid-column: 1 / 3;
    grid-row: 2;
  }
  .header-aspirational {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    grid-column: 5;
    grid-row: 1 / 3;
    align-self: center;
  }

  /* ── MODE TOGGLE ── */
  .mode-toggle {
    grid-column: 3;
    grid-row: 1 / 3;
    justify-self: center;
    align-self: center;
    display: flex;
    border: 1.5px solid var(--accent);
    border-radius: 30px;
    padding: 3px;
    gap: 2px;
  }
  .mode-btn {
    border: none;
    background: transparent;
    color: var(--accent);
    border-radius: 24px;
    padding: 7px 18px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: inherit;
    pointer-events: none;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .mode-btn.active {
    background: var(--accent);
    color: var(--bg);
  }

  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    height: calc(100vh - 78px);
    overflow: hidden;
  }

  /* ── LEFT ── */
  .roadmap-col {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .roadmap-col-header {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    padding: 14px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .roadmap-col-header p {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .legend {
    display: flex;
    gap: 12px;
    margin-left: auto;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
  }
  .legend-pip { width: 8px; height: 8px; border-radius: 2px; }

  .phases-list {
    padding: 16px 16px 60px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* ── PHASE CLUSTER ── */
  .phase-cluster {
    border-radius: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s, opacity 0.3s;
  }
  .phase-cluster.status-past     { border-color: rgba(0,229,160,0.2); opacity: 1; }
  .phase-cluster.status-current  { border-color: rgba(0,145,255,0.45); box-shadow: 0 0 20px rgba(0,145,255,0.08); }
  .phase-cluster.status-future   { border-color: var(--border); opacity: 0.4; }

  .phase-cluster.status-past   .cluster-phase-label { color: var(--accent); }
  .phase-cluster.status-current .cluster-phase-label { color: var(--accent2); }

  .phase-cluster.status-past    .item-chip { opacity: 1; }
  .phase-cluster.status-current .item-chip { border-color: #252c3e; color: var(--text); }
  .phase-cluster.status-future  .item-chip { opacity: 0.3; }

  .badge-past    { background: rgba(0,229,160,0.15);   color: var(--accent); }
  .badge-current { background: rgba(0,145,255,0.15);   color: var(--accent2); }
  .badge-future  { background: rgba(255,255,255,0.05); color: var(--text-dim); }

  .cluster-header {
    padding: 10px 14px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cluster-phase-label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .phase-cluster.status-active .cluster-phase-label { color: var(--accent2); }
  .phase-cluster.status-done   .cluster-phase-label { color: var(--accent); }

  .cluster-title { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; }

  .cluster-status-badge {
    margin-left: auto;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
    width: 82px;
    text-align: center;
  }

  .cluster-body { padding: 10px 12px; background: var(--surface); }

  .chips-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }

  .item-chip {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 7px 10px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--surface2);
    font-size: 11px;
    font-weight: 500;
    color: var(--text-mid);
    transition: opacity 0.3s;
    min-width: 0;
  }
  .item-chip span:last-child {
    line-height: 1.4;
  }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }

  .dot-targeting   { background: #a78bfa; }
  .dot-bs          { background: #f87171; }
  .dot-view        { background: #60a5fa; }
  .dot-class       { background: #f472b6; }
  .dot-trueclarity { background: #34d399; }

  .phase-cluster.status-active .item-chip { border-color: #252c3e; color: var(--text); }
  .phase-cluster.status-upcoming .item-chip { opacity: 0.35; }
  .phase-cluster.status-done     .item-chip { opacity: 0.5; }

  .phase-cluster.status-past    .chip-dot { background: var(--accent); }
  .phase-cluster.status-current .chip-dot { background: var(--accent2); }
  .phase-cluster.status-future  .chip-dot { background: var(--border); }

  /* ── YOU ARE HERE LINE ── */
  #nowLineFixed {
    position: fixed;
    left: 0;
    width: 420px;
    height: 1px;
    pointer-events: none;
    z-index: 20;
    background: linear-gradient(90deg, rgba(255,220,80,0.04) 0%, rgba(255,220,80,0.5) 20%, rgba(255,220,80,0.5) 92%, transparent 100%);
  }
  #nowLineFixed::after {
    content: 'YOU ARE HERE';
    position: absolute;
    right: 16px;
    top: -16px;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: rgba(255,220,80,0.55);
    letter-spacing: 0.12em;
  }

  /* ── MILESTONE FLAG ── */
  .milestone-flag {
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid rgba(255,107,53,0.25);
    background: rgba(255,107,53,0.05);
    border-radius: 8px;
    padding: 10px 14px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .milestone-flag.unlocked {
    border-color: rgba(0,229,160,0.35);
    background: rgba(0,229,160,0.06);
  }
  .milestone-flag.unlocked .ms-diamond {
    background: var(--accent);
    border-color: var(--accent);
  }
  .milestone-flag.unlocked .ms-title { color: var(--accent); }
  .milestone-flag.unlocked .ms-badge {
    background: rgba(0,229,160,0.15);
    color: var(--accent);
  }
  .ms-diamond {
    width: 11px; height: 11px;
    border: 2px solid var(--milestone);
    transform: rotate(45deg);
    flex-shrink: 0;
    background: var(--bg);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .ms-text { flex: 1; }
  .ms-title { font-size: 12px; font-weight: 700; color: var(--milestone); }
  .ms-sub {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
    line-height: 1.4;
  }
  .ms-badge {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,107,53,0.15);
    color: var(--milestone);
    flex-shrink: 0;
    transition: background 0.3s;
    width: 64px;
    text-align: center;
  }

  /* ── RIGHT: CAPABILITIES ── */
  .caps-col {
    overflow-y: auto;
    padding: 22px 28px 40px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    transition: background 0.4s;
  }
  .caps-header {
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .caps-label {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .caps-title {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .caps-title::before {
    content: 'Phase:';
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.12em;
    flex-shrink: 0;
  }
  .caps-subtitle {
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    font-family: 'DM Mono', monospace;
    margin-top: 5px;
  }

  .segments-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .segment-card {
    border-radius: 10px;
  }
  .segment-card.wide { grid-column: span 2; }

  .seg-header {
    padding: 11px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .seg-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.75; }
  .seg-icon svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.75; }
  .seg-name { font-size: 13px; font-weight: 600; }
  .seg-count {
    margin-left: auto;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
  }

  .seg-body { padding: 10px 16px; min-height: 52px; }

  .seg-sell-to {
    padding: 7px 16px 9px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-mid);
    line-height: 1.6;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .seg-sell-to strong {
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 9px;
  }
  .seg-sell-to .sell-none {
    opacity: 0.45;
    font-style: italic;
  }

  .cap-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    animation: fadeUp 0.35s ease both;
  }
  .cap-item:last-child { border-bottom: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .cap-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; background: var(--accent); }
  .cap-text { font-size: 12px; line-height: 1.45; color: var(--text-mid); flex: 1; }
  .cap-text strong { color: var(--text); font-weight: 600; }
  .cap-phase {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    padding-top: 4px;
    flex-shrink: 0;
  }
  .empty-state {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    text-align: center;
    padding: 14px 0;
    font-style: italic;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── ONBOARDING TOUR ── */
  .tour-overlay { position: fixed; inset: 0; z-index: 9000; pointer-events: all; }
  .tour-overlay.hidden { display: none; }
  .tour-spotlight {
    position: fixed;
    border-radius: 8px;
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.76);
    z-index: 9001;
    pointer-events: none;
    transition: top 0.32s cubic-bezier(0.4,0,0.2,1), left 0.32s cubic-bezier(0.4,0,0.2,1),
                width 0.32s cubic-bezier(0.4,0,0.2,1), height 0.32s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes tourPulse {
    0%, 100% { box-shadow: 0 0 0 9999px rgba(0,0,0,0.76), 0 0 0 2px var(--accent); }
    50%       { box-shadow: 0 0 0 9999px rgba(0,0,0,0.76), 0 0 0 4px var(--accent); }
  }
  .tour-spotlight.pulse { animation: tourPulse 2s ease-in-out infinite; }
  .tour-card {
    position: fixed;
    z-index: 9002;
    width: 280px;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 18px 20px 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    transition: top 0.32s cubic-bezier(0.4,0,0.2,1), left 0.32s cubic-bezier(0.4,0,0.2,1);
  }
  .tour-card-text { font-size: 13px; color: var(--text-mid); line-height: 1.55; margin-bottom: 16px; }
  .tour-card-text strong { color: var(--text); }
  .tour-actions { display: flex; justify-content: space-between; align-items: center; }
  .tour-dots { display: flex; gap: 5px; align-items: center; }
  .tour-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); transition: background 0.2s; }
  .tour-dot.active { background: var(--accent); }
  .tour-btn-skip {
    font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em;
    color: var(--text-dim); background: none; border: none; cursor: pointer; padding: 0;
  }
  .tour-btn-skip:hover { color: var(--text-mid); }
  .tour-btn-next {
    font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 0.06em;
    text-transform: uppercase; font-weight: 500;
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 20px; padding: 6px 16px; cursor: pointer;
  }
  .tour-btn-next:hover { opacity: 0.85; }


  /* ── CARD FLIP ── */
  .card-flip-wrapper {
    perspective: 800px;
  }
  .card-inner {
    position: relative;
    width: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                min-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card-inner.flipped {
    transform: rotateY(180deg);
  }
  .card-front, .card-back {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .card-back {
    position: absolute;
    top: 0; left: 0; right: 0;
    transform: rotateY(180deg);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  /* When flipped: collapse the front so only the back determines height,
     and promote the back into normal flow */
  .card-inner.flipped .card-front {
    visibility: hidden;
    height: 0;
    overflow: hidden;
  }
  .card-inner.flipped .card-back {
    position: relative;
    top: auto; left: auto; right: auto;
  }

  /* ── SALES BACK CONTENT ── */
  .sales-section { padding: 10px 16px; }
  .sales-section + .sales-section { border-top: 1px solid var(--border); }
  .sales-section-label {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .sales-sell-line {
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.45;
  }
  .sales-sell-line p { margin: 6px 0 0; }
  .sales-sell-line ul { margin: 4px 0 0; padding-left: 16px; }
  .sales-sell-line li { margin: 2px 0; }
  .sales-sell-line.empty {
    opacity: 0.45;
    font-style: italic;
  }
  .sales-section-hint {
    font-size: 12px;
    color: var(--text-mid);
    opacity: 0.45;
    font-style: italic;
    margin-bottom: 8px;
    line-height: 1.45;
  }
  .blocker-subheading {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 6px 0 4px;
  }
  .blocker-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    font-size: 12px;
  }
  .blocker-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0; margin-top: 5px;
    background: var(--milestone);
  }
  .blocker-text { color: var(--text-mid); flex: 1; line-height: 1.45; }
  .blocker-text strong { color: var(--text); }
  .blocker-timing {
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .segment-card-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
</style>
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.js"></script>
</head>

function lucideIcon(name) {
  try {
    const iconFn = lucide[name];
    if (!iconFn) return '';
    // lucide UMD exports icons as [tag, attrs, children] tuples
    const [tag, attrs, children] = iconFn;
    const attrStr = Object.entries({ ...attrs, width: 16, height: 16, 'stroke-width': 1.75 })
      .map(([k, v]) => `${k}="${v}"`).join(' ');
    const childStr = (children || []).map(([t, a]) =>
      `<${t} ${Object.entries(a).map(([k,v]) => `${k}="${v}"`).join(' ')}/>`
    ).join('');
    return `<svg ${attrStr}>${childStr}</svg>`;
  } catch(e) { return ''; }
}

function maybeShowTour() {
  if (localStorage.getItem(TOUR_KEY)) return;
  tourStep = 0;
  showTourStep();
}

function showTourStep() {
  const overlay   = document.getElementById('tourOverlay');
  const spotlight = document.getElementById('tourSpotlight');
  const card      = document.getElementById('tourCard');
  overlay.classList.remove('hidden');

  const step = TOUR_STEPS[tourStep];
  document.getElementById('tourText').innerHTML = step.text;
  document.getElementById('tourNextBtn').textContent = tourStep === TOUR_STEPS.length - 1 ? 'Got it' : 'Next →';
  for (let i = 0; i < TOUR_STEPS.length; i++)
    document.getElementById('tourDot' + i).classList.toggle('active', i === tourStep);

  const raw  = step.target();
  const rect = raw instanceof Element ? raw.getBoundingClientRect() : raw;
  const pad  = 8;
  spotlight.style.left   = (rect.left   - pad) + 'px';
  spotlight.style.top    = (rect.top    - pad) + 'px';
  spotlight.style.width  = (rect.width  + pad * 2) + 'px';
  spotlight.style.height = (rect.height + pad * 2) + 'px';
  spotlight.classList.add('pulse');

  // Position card relative to spotlight
  const margin = 20, cardW = 280, cardH = 140;
  const vW = window.innerWidth, vH = window.innerHeight;
  let left, top;
  if (step.position === 'right' && rect.right + margin + cardW < vW) {
    left = rect.right + margin;
    top  = Math.max(margin, Math.min(vH - cardH - margin, rect.top + rect.height / 2 - cardH / 2));
  } else if (step.position === 'left' && rect.left - margin - cardW > 0) {
    left = rect.left - margin - cardW;
    top  = Math.max(margin, Math.min(vH - cardH - margin, rect.top + rect.height / 2 - cardH / 2));
  } else {
    left = Math.max(margin, Math.min(vW - cardW - margin, rect.left + rect.width / 2 - cardW / 2));
    top  = Math.min(vH - cardH - margin, rect.bottom + margin);
  }
  card.style.left = left + 'px';
  card.style.top  = top  + 'px';
}

function nextTourStep() {
  tourStep++;
  if (tourStep >= TOUR_STEPS.length) endTour();
  else showTourStep();
}

function skipTour() { endTour(); }

function endTour() {
  document.getElementById('tourOverlay').classList.add('hidden');
  localStorage.setItem(TOUR_KEY, '1');
}

// ── Render phases (static, no buttons) ─────────────────────────────────────
function renderPhases() {
  const list = document.getElementById('phasesList');
  list.innerHTML = '';

  PHASES.forEach((phase, pi) => {
    // Cluster status relative to nowIndex
    // past = phase fully behind the line (pi < nowIndex)
    // current = phase the line sits within or just after (pi === nowIndex - 1 when line is after this phase... actually we treat "current" as the boundary phase)
    // We define: past = pi < nowIndex-1, current = pi === nowIndex-1, future = pi >= nowIndex
    let status;
    if (pi < nowIndex - 1) status = 'past';
    else if (pi === nowIndex - 1) status = 'current';
    else status = 'future';

    // If nowIndex === 0, all are future
    if (nowIndex === 0) status = 'future';
    // If nowIndex === PHASES.length, all are past except last which is current
    if (nowIndex === PHASES.length && pi === PHASES.length - 1) status = 'current';

    const cluster = document.createElement('div');
    cluster.className = `phase-cluster status-${status}`;
    cluster.dataset.phaseIdx = pi;

    const badgeText = status === 'past' ? '✓ complete' : status === 'current' ? '● in progress' : 'upcoming';
    cluster.innerHTML = `
      <div class="cluster-header">
        <span class="cluster-phase-label">${phase.label}</span>
        <span class="cluster-title">${phase.title}</span>
        <span class="cluster-status-badge badge-${status}">${badgeText}</span>
      </div>
      <div class="cluster-body">
        <div class="chips-grid">
          ${phase.items.map(item => `
            <span class="item-chip"><span class="chip-dot dot-${item.cat}"></span><span>${item.label}</span></span>
          `).join('')}
        </div>
      </div>
    `;
    list.appendChild(cluster);


    // Milestone after each phase
    const msUnlocked = pi < nowIndex;
    const ms = document.createElement('div');
    ms.className = `milestone-flag${msUnlocked ? ' unlocked' : ''}`;
    ms.dataset.msIdx = pi;
    ms.innerHTML = `
      <div class="ms-diamond"></div>
      <div class="ms-text">
        <div class="ms-title">⚑ &nbsp;${phase.milestone.label}</div>
        <div class="ms-sub">${phase.milestone.sub}</div>
      </div>
      <span class="ms-badge">${msUnlocked ? 'unlocked' : 'locked'}</span>
    `;
    list.appendChild(ms);
  });

}

// ── Scroll-driven now-line ─────────────────────────────────────────────────
// The now-line is a fixed rule at ~40% down the left panel viewport.
// As you scroll, milestones that pass above the line unlock capabilities.

const NOW_LINE_FRAC = 0.40; // 40% down the panel

function getNowLineViewportY() {
  const line = document.getElementById('nowLineFixed');
  if (!line) {
    const col = document.querySelector('.roadmap-col');
    const colRect = col.getBoundingClientRect();
    return colRect.top + colRect.height * 0.5;
  }
  return parseFloat(line.style.top) || 0;
}

function updateNowFromScroll() {
  const list = document.getElementById('phasesList');
  if (!list) return;
  const clusters = list.querySelectorAll('.phase-cluster');
  const milestones = list.querySelectorAll('.milestone-flag');
  if (!clusters.length) return;

  const lineY = getNowLineViewportY();

  // Determine each cluster's state directly from its position
  let capsIndex = 0; // how many milestones have been crossed (for capabilities)
  clusters.forEach((cl, i) => {
    const clRect = cl.getBoundingClientRect();
    cl.classList.remove('status-past', 'status-current', 'status-future');
    let s;
    if (clRect.bottom < lineY) {
      s = 'past';       // fully above the line
      capsIndex = i + 1;
    } else if (clRect.top < lineY) {
      s = 'current';    // straddling the line
    } else {
      s = 'future';     // below the line
    }
    cl.classList.add('status-' + s);
    const badge = cl.querySelector('.cluster-status-badge');
    if (badge) {
      badge.className = 'cluster-status-badge badge-' + s;
      badge.textContent = s === 'past' ? '✓ complete' : s === 'current' ? '● in progress' : 'upcoming';
    }
  });

  // Milestone unlock: when milestone top crosses the line
  milestones.forEach((ms, i) => {
    const msRect = ms.getBoundingClientRect();
    const unlocked = msRect.top < lineY;
    ms.classList.toggle('unlocked', unlocked);
    const badge = ms.querySelector('.ms-badge');
    if (badge) badge.textContent = unlocked ? 'unlocked' : 'locked';
    // Fire confetti when the final milestone unlocks
    if (unlocked && i === milestones.length - 1) launchConfetti();
  });

  // Update capabilities based on how many milestones have been crossed
  let newIndex = 0;
  milestones.forEach((ms, i) => {
    if (ms.getBoundingClientRect().top < lineY) newIndex = i + 1;
  });

  if (newIndex !== nowIndex) {
    nowIndex = newIndex;
    renderCapabilities();
  }
}

function updatePhaseStates() {
  const list = document.getElementById('phasesList');
  const clusters = list.querySelectorAll('.phase-cluster');
  clusters.forEach((cl, pi) => {
    cl.classList.remove('status-past', 'status-current', 'status-future');
    let s;
    if (nowIndex === 0) s = pi === 0 ? 'current' : 'future';
    else if (nowIndex >= PHASES.length) s = pi < PHASES.length - 1 ? 'past' : 'current';
    else if (pi < nowIndex - 1) s = 'past';
    else if (pi === nowIndex - 1) s = 'current';
    else s = 'future';
    cl.classList.add('status-' + s);
    const badge = cl.querySelector('.cluster-status-badge');
    if (badge) {
      badge.className = 'cluster-status-badge badge-' + s;
      badge.textContent = s === 'past' ? '✓ complete' : s === 'current' ? '● in progress' : 'upcoming';
    }
  });
}

  const col = document.querySelector('.roadmap-col');
  let line = document.getElementById('nowLineFixed');
  if (!line) {
    line = document.createElement('div');
    line.id = 'nowLineFixed';
    document.body.appendChild(line); // fixed positioning needs to be in body
  }
  const colRect = col.getBoundingClientRect();
  // Pin the line at the vertical centre of the column
  line.style.top = Math.round(colRect.top + colRect.height * 0.5) + 'px';
  line.style.left = colRect.left + 'px';
  line.style.width = colRect.width + 'px';
}

function scrollToNow() {
  // We're in March 2026 — partway through Q1.
  // Scroll so the Q1 2026 cluster (index 1) top sits just at the YOU ARE HERE line,
  // showing it as "in progress" and the Done cluster as past.
  const col = document.querySelector('.roadmap-col');
  const list = document.getElementById('phasesList');
  const clusters = list.querySelectorAll('.phase-cluster');
  if (clusters.length < 2) return;

  const colRect = col.getBoundingClientRect();
  const lineViewportY = colRect.top + colRect.height * 0.5;

  const q1 = clusters[1]; // Q1 2026
  const q1ScrollY = list.offsetTop + q1.offsetTop;
  // Place the cluster top just a few px below the line so it reads as current
  col.scrollTop = q1ScrollY - (lineViewportY - colRect.top) + 4;
}

// ── Confetti ───────────────────────────────────────────────────────────────
let confettiFired = false;

function launchConfetti() {
  if (confettiFired) return;
  confettiFired = true;

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const palette = ['#00e5a0','#a78bfa','#60a5fa','#f472b6','rgba(255,220,80,0.9)','#f87171'];
  const COUNT = 90;
  const pieces = Array.from({ length: COUNT }, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 120,
    w: 5 + Math.random() * 5,
    h: 3 + Math.random() * 3,
    color: palette[Math.floor(Math.random() * palette.length)],
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.15,
    vx: (Math.random() - 0.5) * 2,
    vy: 1.5 + Math.random() * 2.5,
    opacity: 0.8 + Math.random() * 0.2,
  }));

  let elapsed = 0;
  const DURATION = 3000;

  function draw(ts) {
    if (!elapsed) elapsed = ts;
    const t = ts - elapsed;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.angle += p.spin;
      const fade = t > DURATION * 0.6 ? 1 - (t - DURATION * 0.6) / (DURATION * 0.4) : 1;
      if (p.y < canvas.height + 20) alive = true;
      ctx.save();
      ctx.globalAlpha = p.opacity * Math.max(0, fade);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    if (alive && t < DURATION * 1.5) requestAnimationFrame(draw);
    else canvas.remove();
  }

  requestAnimationFrame(draw);
}

// ── Capabilities ──────────────────────────────────────────────────────────
// ── Sales Mode ────────────────────────────────────────────────────────────
function setMode(isSales) {
  if (salesMode === isSales) return;
  const fromSales = salesMode;
  salesMode = isSales;
  document.getElementById('modeStandard').classList.toggle('active', !salesMode);
  document.getElementById('modeSales').classList.toggle('active', salesMode);
  document.getElementById('capsLabel').textContent = salesMode ? 'Sales Viability' : 'Unlocked Capabilities';
  renderCapabilities(fromSales, true);
  saveState();
}

function buildBlockerLists(segId, nowIndex) {
  const milestoneOrder = PHASES.map(p => p.milestone.id);
  const futureMs = milestoneOrder.slice(nowIndex); // everything after current
  const comingSoon = [];
  const later = [];

  futureMs.forEach((msId, i) => {
    const msData = MILESTONE_CAPS[msId];
    if (!msData) return;
    const segData = msData.segments[segId];
    if (!segData) return;

    segData.caps.forEach(cap => {
      if (!cap.keyBlocker) return;
      const relevant = cap.keyBlocker === 'both' || cap.keyBlocker === 'sales'
        || ((segId === 'dsp' || segId === 'ssp') && cap.keyBlocker === 'integration');
      if (!relevant) return;
      const item = { text: cap.text, phase: MILESTONE_CAPS[msId].subtitle, blockerType: cap.keyBlocker };
      if (i === 0) comingSoon.push(item);
      else later.push(item);
    });
  });

  return { comingSoon, later };
}

function buildSalesBack(seg, allCaps, nowIndex) {
  const segId = seg.id;
  const segData = allCaps[segId] || {};
  const sv = segData.salesView || {};
  const sellLine = sv.sellLine || segData.saleableTo || null;
  const integrateLine = (segId === 'dsp' || segId === 'ssp') ? (sv.integrateLine || segData.integrateWith || null) : null;

  const { comingSoon, later } = buildBlockerLists(segId, nowIndex);

  let html = '';

  // Header — matches front card style
  html += `<div class="seg-header">
    <span class="seg-icon">${lucideIcon(seg.icon)}</span>
    <span class="seg-name">${seg.name}</span>
  </div>`;

  // Sell to section
  const sellClass = sellLine ? '' : ' empty';
  const sellText = sellLine || 'Nothing saleable yet at this stage';
  html += `<div class="sales-section">
    <div class="sales-section-label">Sell to:</div>
    <div class="sales-sell-line${sellClass}">${sellText}</div>
  </div>`;

  // Integration value section (DSP/SSP only)
  if (integrateLine) {
    html += `<div class="sales-section">
      <div class="sales-section-label">Integration Prospects:</div>
      <div class="sales-sell-line">${integrateLine}</div>
    </div>`;
  }

  // Capability gaps section
  if (comingSoon.length || later.length) {
    const blockerItems = (items) => items.map(item => `
      <div class="blocker-item">
        <div class="blocker-dot"></div>
        <div class="blocker-text">${item.text}</div>
        <div class="blocker-timing">${item.phase}</div>
      </div>`).join('');

    let gapsHtml = '';
    if (comingSoon.length) {
      gapsHtml += `<div class="blocker-subheading">Coming soon</div>${blockerItems(comingSoon)}`;
    }
    if (later.length) {
      gapsHtml += `<div class="blocker-subheading">Later</div>${blockerItems(later)}`;
    }

    html += `<div class="sales-section">
      <div class="sales-section-label">Key Capability Gaps:</div>
      ${gapsHtml}
    </div>`;
  }

  return html;
}

// ── Capabilities ──────────────────────────────────────────────────────────
function renderCapabilities(fromSales = false, animate = false) {
  const allCaps = {
    advertiser: { saleableTo: null, salesView: null, integrateWith: null, caps: [] },
    dsp:        { saleableTo: null, salesView: null, integrateWith: null, caps: [] },
    ssp:        { saleableTo: null, salesView: null, integrateWith: null, caps: [] },
    publisher:  { saleableTo: null, salesView: null, integrateWith: null, caps: [] },
    curator:    { saleableTo: null, salesView: null, integrateWith: null, caps: [] },
  };

  for (let i = 0; i < nowIndex; i++) {
    const msData = MILESTONE_CAPS[PHASES[i].milestone.id];
    if (msData) Object.keys(allCaps).forEach(seg => {
      const segData = msData.segments[seg];
      if (segData) {
        // Apply new caps (skip suppressed ids)
        const suppress = new Set(segData.suppress || []);
        segData.caps.forEach(cap => {
          if (cap.salesOnly && !salesMode) return; // hide salesOnly caps in normal mode
          if (!suppress.has(cap.id)) allCaps[seg].caps.push(cap);
        });
        // Apply overrides: replace existing cap text/cat by id
        if (segData.overrides) {
          Object.entries(segData.overrides).forEach(([id, override]) => {
            const idx = allCaps[seg].caps.findIndex(c => c.id === id);
            if (idx !== -1) allCaps[seg].caps[idx] = { ...allCaps[seg].caps[idx], ...override };
          });
        }
        if (segData.saleableTo) allCaps[seg].saleableTo = segData.saleableTo;
        if (segData.integrateWith) allCaps[seg].integrateWith = segData.integrateWith;
        if (segData.salesView) allCaps[seg].salesView = segData.salesView;
      }
    });
  }

  let titleHTML, subtitle;
  if (nowIndex === 0) {
    titleHTML = 'scroll to explore';
    subtitle = '';
  } else {
    const info = MILESTONE_CAPS[PHASES[nowIndex - 1].milestone.id];
    titleHTML = info.title;
    subtitle = info.subtitle;
  }

  document.getElementById('capsTitle').innerHTML = titleHTML;
  document.getElementById('capsSubtitle').textContent = subtitle;

  const grid = document.getElementById('segmentsGrid');
  grid.innerHTML = '';

  SEGMENTS.forEach((seg, idx) => {
    const segData = allCaps[seg.id] || { saleableTo: null, salesView: null, integrateWith: null, caps: [] };
    const caps = segData.caps || [];
    const sellTo = segData.saleableTo || null;
    const integrateWith = segData.integrateWith || null;
    const sellClass = sellTo ? '' : 'sell-none';
    const sellText = sellTo || 'Nothing saleable yet at this stage';
    const integrateHTML = integrateWith ? `<span><strong class="integrate-label">Integrate:</strong> ${integrateWith}</span>` : '';
    const sellToHTML = `<div class="seg-sell-to"><span><strong>Sell:</strong> <span class="${sellClass}">${sellText}</span></span>${integrateHTML}</div>`;

    const frontHTML = `
      <div class="card-front segment-card-inner">
        <div class="seg-header">
          <span class="seg-icon">${lucideIcon(seg.icon)}</span>
          <span class="seg-name">${seg.name}</span>
          <span class="seg-count">${caps.length} ${caps.length === 1 ? 'capability' : 'capabilities'}</span>
        </div>
        ${sellToHTML}
        <div class="seg-body">
          ${caps.length === 0
            ? '<div class="empty-state">No capabilities unlocked yet</div>'
            : `<div class="sales-section-label" style="margin-bottom:8px;">Capabilities:</div>` + caps.map((cap, i) => `
                <div class="cap-item" style="animation-delay:${i*0.04}s">
                  <div class="cap-dot dot-${cap.cat}"></div>
                  <div class="cap-text">${cap.text}</div>
                  <div class="cap-phase">${cap.phase}</div>
                </div>`).join('')}
        </div>
      </div>`;

    const backHTML = `<div class="card-back">${buildSalesBack(seg, allCaps, nowIndex)}</div>`;

    const wrapper = document.createElement('div');
    wrapper.className = 'card-flip-wrapper segment-card' + (seg.wide ? ' wide' : '');

    const inner = document.createElement('div');
    inner.className = 'card-inner';
    inner.style.transitionDelay = `${idx * 0.06}s`;
    inner.innerHTML = frontHTML + backHTML;

    wrapper.appendChild(inner);
    grid.appendChild(wrapper);
  });

  const maxDelay = (SEGMENTS.length - 1) * 60 + 500 + 50;
  const gen = ++animGen;

  if (salesMode && animate) {
    // Toggle into sales: pin front height, flip (CSS collapses front / promotes back),
    // min-height transition smooths the height change
    requestAnimationFrame(() => {
      if (animGen !== gen) return;
      const inners = [...grid.querySelectorAll('.card-inner')];
      inners.forEach(inner => {
        inner.style.minHeight = inner.getBoundingClientRect().height + 'px';
      });
      requestAnimationFrame(() => {
        if (animGen !== gen) return;
        inners.forEach(inner => {
          inner.style.minHeight = '';
          inner.classList.add('flipped');
        });
      });
    });
  } else if (salesMode) {
    // Scroll while already in sales mode: set flipped state instantly (no animation)
    grid.querySelectorAll('.card-inner').forEach(inner => {
      inner.style.transition = 'none';
      inner.classList.add('flipped');
    });
    requestAnimationFrame(() => {
      if (animGen !== gen) return;
      grid.querySelectorAll('.card-inner').forEach(inner => inner.style.transition = '');
    });
  } else if (fromSales) {
    // Flip out: start from flipped state instantly, then animate back to front
    requestAnimationFrame(() => {
      if (animGen !== gen) return;
      const inners = [...grid.querySelectorAll('.card-inner')];
      inners.forEach(inner => {
        inner.style.transition = 'none';
        inner.classList.add('flipped');
      });
      requestAnimationFrame(() => {
        if (animGen !== gen) return;
        inners.forEach(inner => {
          inner.style.transition = '';
          inner.classList.remove('flipped');
        });
      });
    });
  }
}

function render() {
  const saved = loadState();

  // Restore sales mode before first render
  if (saved.salesMode) {
    salesMode = true;
    document.getElementById('modeStandard').classList.remove('active');
    document.getElementById('modeSales').classList.add('active');
    document.getElementById('capsLabel').textContent = 'Sales Viability';
  }

  renderPhases();
  renderCapabilities();
  positionNowLine();
  setBottomPadding(); // apply top+bottom padding before scroll so offsetTops are correct

  const col = document.querySelector('.roadmap-col');
  const caps = document.getElementById('capsCol');

  col.addEventListener('scroll', () => { updateNowFromScroll(); saveState(); }, { passive: true });
  caps.addEventListener('scroll', saveState, { passive: true });

  window.addEventListener('resize', () => { positionNowLine(); setBottomPadding(); });

  // Restore scroll positions or fall back to scrollToNow
  if (saved.leftScroll != null) {
    col.scrollTop = saved.leftScroll;
  } else {
    scrollToNow();
  }

  requestAnimationFrame(() => {
    positionNowLine();
    setBottomPadding();
    updateNowFromScroll();
    // Restore right panel scroll after layout settles
    if (saved.rightScroll != null) caps.scrollTop = saved.rightScroll;
  });
}

render();
window.addEventListener('load', maybeShowTour);
</script>
